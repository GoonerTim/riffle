name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget
          wget https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt-get install -y -V ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt-get update
          sudo apt-get install -y -V \
            cmake ninja-build g++ clang-tidy clang-format \
            libarrow-dev libparquet-dev libzstd-dev libsnappy-dev \
            libsimdjson-dev libgtest-dev

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  lint:
    name: Format & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget python3-pip
          wget https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt-get install -y -V ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt-get update
          sudo apt-get install -y -V \
            cmake ninja-build g++ \
            libarrow-dev libparquet-dev libzstd-dev libsnappy-dev \
            libsimdjson-dev libgtest-dev
          python3 -m pip install --user --break-system-packages clang-format==18.1.8
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install clang-tidy 19 (matches local; parses C++23 <expected>)
        run: |
          set -e
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt-get install -y clang-tidy-19

      - name: Check formatting
        run: |
          clang-format --version
          files=$(git ls-files '*.cpp' '*.hpp' '*.h')
          if [ -n "$files" ]; then clang-format --dry-run --Werror $files; fi

      - name: Configure for clang-tidy
        run: cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          clang-tidy-19 --version
          files=$(git ls-files '*.cpp' '*.hpp' | grep -vE 'src/adapters/(json_parser|schema_json)\.cpp')
          if [ -n "$files" ]; then clang-tidy-19 -p build $files; fi
